name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/zigzag
      DIRECT_URL: postgresql://ci:ci@localhost:5432/zigzag
      NEXTAUTH_SECRET: ci-test-secret
      AUTH_SECRET: ci-test-secret
      AUTH_TRUST_HOST: 'true'
      NEXTAUTH_URL: http://127.0.0.1:3070
      E2E_EMAIL: e2e@zigzag.test
      E2E_PASSWORD: e2e-Password123!

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: zigzag
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci -d zigzag"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (with coverage gate)
        run: npm test -- --runInBand --coverage

      - name: IDOR cross-tenant tests
        run: npm run test:idor

      - name: IDOR audit matrix coverage gate
        run: npm run check:idor-coverage

      - name: Apply migrations
        run: npm run db:migrate

      - name: Seed database
        run: npm run seed

      - name: Create E2E user
        run: node scripts/ci-create-e2e-user.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Visual baselines are darwin-only today; run chromium + mobile critically.
      # Update linux snapshots with: npm run test:e2e:visual:update
      - name: E2E (critical path, includes axe-core a11y gate)
        run: npx playwright test --project=chromium --project=mobile-chrome

      - name: Build
        run: npm run build

      - name: Lighthouse (mobile baseline, informational)
        run: npm run lighthouse:mobile
        continue-on-error: true
