name: Production migrations

# Manual fallback when you need to apply pending migrations without a full
# Vercel redeploy. Normal production deploys run migrate:deploy in vercel-build.

on:
  workflow_dispatch:

concurrency:
  group: production-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply pending migrations
        run: npm run migrate:deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
